<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Asian Cipher</title>

<!-- Font for vertical Chinese characters -->
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    padding: 0;
    background: #f2e6c9; /* soft rice-paper tone */
    font-family: Georgia, serif;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
}

/* Main scroll layout (taller than wide, like a hanging scroll) */
.scroll {
    width: 600px;
    height: 900px;
    background: #fbf3dc;
    position: relative;
    box-shadow: 0 0 60px rgba(0,0,0,0.25);
    border-left: 18px solid #5b0f0f;
    border-right: 18px solid #5b0f0f;
    padding: 60px 50px;
    box-sizing: border-box;
    display: flex;
    flex-direction: column;
}

/* Decorative wooden bars at top and bottom */
.scroll::before,
.scroll::after {
    content: "";
    position: absolute;
    left: -18px;
    width: calc(100% + 36px);
    height: 28px;
    background: #5b0f0f;
}

.scroll::before { top: -28px; }
.scroll::after { bottom: -28px; }

h1 {
    text-align: center;
    font-size: 36px;
    margin-bottom: 5px;
    letter-spacing: 2px;
}

.subtitle {
    text-align: center;
    font-size: 14px;
    margin-bottom: 30px;
    opacity: 0.7;
}

/* Text input area */
textarea {
    width: 100%;
    height: 80px;
    padding: 10px;
    font-size: 16px;
    border: 2px solid #5b0f0f;
    background: #fffaf0;
    resize: none;
    box-sizing: border-box;
}

/* Button styling */
button {
    margin-top: 15px;
    padding: 10px;
    font-size: 16px;
    background: #5b0f0f;
    color: #fffaf0;
    border: none;
    cursor: pointer;
}

button:hover {
    background: #7a1a1a;
}

/* Area where the encoded characters appear */
.output-container {
    margin-top: 40px;
    flex: 1;
    border: 2px dashed #5b0f0f;
    background: #fffaf0;
    padding: 20px;
    display: flex;
    justify-content: flex-end; /* start from the right side */
    overflow: hidden;
}

/* Vertical Chinese layout */
.output {
    font-family: 'Noto Serif SC', serif;
    writing-mode: vertical-rl;   /* top to bottom */
    text-orientation: upright;
    font-size: 24px;
    letter-spacing: 5px;
    line-height: 2;
    overflow-y: auto;
    max-height: 100%;
}
</style>
</head>

<body>

<div class="scroll">
    <h1>Asian Cipher</h1>
    <div class="subtitle">Stroke-Based Substitution Encryption</div>

    <textarea id="inputText" placeholder="Enter English text..."></textarea>
    <button onclick="encodeText()">Encode</button>

    <div class="output-container">
        <div class="output" id="outputText"></div>
    </div>
</div>

<script src="script.js"></script>

<script>
// This just takes whatever the user typed,
// sends it through your asianCipher function,
// and places the result into the vertical display area.
function encodeText() {
    const text = document.getElementById("inputText").value;
    const result = asianCipher(text);
    document.getElementById("outputText").textContent = result;
}
</script>

</body>
</html>
